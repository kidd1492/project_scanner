{% extends "layout.html" %}
{% block title %}Dashboard — {{ project.project_name }}{% endblock %}

{% block body %}

<script>
    const PROJECT_NAME = "{{ project.project_name }}";
</script>

<link rel="stylesheet" href="/static/css/dashboard.css">
<script src="/static/js/dashboard.js" defer></script>

<div class="dashboard-container">

    <!-- Overview Panel -->
    <div class="dash-box" id="overview-box">
        <h2>{{ project.project_name }}</h2>
        <div id="overview-content">
            <!-- Filled by JS -->
        </div>
    </div>

    <!-- File Type Pie -->
    <div class="dash-box">
        <h3>File Type Distribution</h3>
        <img id="chart-file-types" class="chart-img" />
    </div>

    <!-- Symbol Distribution -->
    <div class="dash-box">
        <h3>Functions / Classes / Methods / Imports</h3>
        <img id="chart-symbols" class="chart-img" />
    </div>

    <!-- Routes vs JS -->
    <div class="dash-box">
        <h3>Routes vs JS Functions</h3>
        <img id="chart-routes-js" class="chart-img" />
    </div>

    <!-- API Calls -->
    <div class="dash-box">
        <h3>API Call Distribution</h3>
        <img id="chart-api-calls" class="chart-img" />
    </div>

    <!-- HTML Events -->
    <div class="dash-box">
        <h3>HTML Event Distribution</h3>
        <img id="chart-html-events" class="chart-img" />
    </div>

</div>

{% endblock %}
