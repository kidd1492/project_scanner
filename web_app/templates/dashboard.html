{% extends "layout.html" %}
{% block title %}Dashboard{% endblock %}

{% block body %}
<div id="dashboard-root" data-project="{{ project_name }}" class="dashboard-container">

    <!-- Title -->
    <h1 id="project-title" class="dashboard-title">Loading...</h1>

    <!-- Summary Section -->
    <section class="dashboard-section">
        <h2>Project Summary</h2>
        <div class="summary-grid">
            <div class="summary-item">
                <span class="summary-label">Total Files:</span>
                <span id="file-count" class="summary-value">...</span>
            </div>
            <div class="summary-item">
                <span class="summary-label">Routes:</span>
                <span id="route-count" class="summary-value">...</span>
            </div>
            <div class="summary-item">
                <span class="summary-label">JS Functions:</span>
                <span id="js-count" class="summary-value">...</span>
            </div>
            <div class="summary-item">
                <span class="summary-label">HTML Events:</span>
                <span id="html-event-count" class="summary-value">...</span>
            </div>
            <div class="summary-item">
                <span class="summary-label">API Calls:</span>
                <span id="api-call-count" class="summary-value">...</span>
            </div>
        </div>
    </section>

    <!-- Charts Section -->
    <section class="dashboard-section">
        <h2>Charts</h2>
        <div id="chart-container" class="chart-grid">
            <!-- JS will insert <img> tags here -->
        </div>
    </section>

    <!-- Detailed Breakdown Section -->
    <section class="dashboard-section">
        <h2>Detailed Breakdown</h2>
        <div id="dashboard-content">
            <!-- JS will populate this -->
        </div>
    </section>

</div>
{% endblock %}
