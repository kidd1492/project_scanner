{% extends "layout.html" %}
{% block title %}Explorer — {{ project.project_name }}{% endblock %}

{% block body %}

<script>
    const PROJECT_NAME = "{{ project.project_name }}";
</script>

<script src="{{ url_for('static', filename='js_files/explorer.js') }}" defer></script>

<!-- Prism for syntax highlighting -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>

<div class="explorer-container">

    <!-- LEFT: File List -->
    <div class="explorer-panel" id="file-list-panel">
        <h3>Files</h3>
        <ul id="file-list"></ul>
    </div>

    <!-- MIDDLE: File Details + Code Viewer -->
    <div class="explorer-panel" id="file-details-panel">
        <h3>File Details</h3>
        <div id="file-details"></div>

        <hr>

        <h3>Source Code</h3>
        <pre id="code-viewer" class="code-block"><code class="language-python"></code></pre>
    </div>

    <!-- RIGHT: Symbol Details -->
    <div class="explorer-panel" id="symbol-details-panel">
        <h3>Symbol Details</h3>
        <div id="symbol-details"></div>
    </div>

</div>

{% endblock %}
