{% extends "layout.html" %}

{% block title %}Learning{% endblock %}

{% block body %}

<div class="left-column">
    <h2>Project Summary</h2>
    <div id="summary-box" class="topic-overview"></div>

    <h2>Files</h2>
    <div id="file-box" class="topic-overview"></div>
</div>

<div class="middle-column">

    <div class="sidebar">
        <input id="project-path" type="text" placeholder="Enter path to project…" class="wiki-input">
        <button onclick="scanProject()" class="wiki-btn">Scan Project</button>
    </div>

    <h2>Analysis Output</h2>
    <div id="analysis-box" class="doc-viewer"></div>

</div>

<div class="right-column">
    <h2>Call Chain</h2>
    <div id="callchain-box" class="topic-overview"></div>
</div>

<script src="{{ url_for('static', filename='js_files/research.js') }}"></script>

<script>
    window.onload = loadExistingProject;
</script>

{% endblock %}
