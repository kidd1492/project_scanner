{% extends "layout.html" %}
{% block title %}Home{% endblock %}

{% block body %}
    <div class="middle-column">
        <div class="chunk-block">
            <h2>Scan a Project</h2>
            <input id="project-path" type="text" placeholder="Enter project path…" class="wiki-input">
            <button onclick="scanProject()" class="wiki-btn">Scan Project</button>
        </div>

        <div class="chunk-block">
            <h2>Existing Projects</h2>
            <ul>
                {% for p in projects %}
                    <li><a href="/dashboard/{{ p }}">{{ p }}</a></li>
                {% else %}
                    <li>No projects found</li>
                {% endfor %}
            </ul>
        </div>
    </div>


{% endblock %}
